<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalization - Creative Portfolio</title>
    <link rel="stylesheet" href="static/css/common.css">
    <link rel="stylesheet" href="static/css/settings.css">
</head>
<body>
    <div class="bg-orb" id="orb1"></div>
    <div class="bg-orb" id="orb2"></div>

    <nav>
        <div class="logo">Settings</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="skills.html">Skills</a>
            <a href="settings.html">Settings</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <section class="section">
        <h2 class="reveal" id="sectiontext">Personalization <span><span id="typewriter">Customization</span><span class="cursor"></span></span></h2>
        <div class="settings-grid">
            <div class="card reveal">
                <h3>Visual Theme</h3>
                <div class="control-group">
                    <label>Background Blur</label>
                    <input type="range" min="0" max="50" value="20">
                </div>
                <div class="control-group">
                    <label>Primary Color Saturation</label>
                    <input type="range" min="0" max="100" value="80">
                </div>
            </div>
            <div class="card reveal">
                <h3>Animation Control</h3>
                <div class="control-group">
                    <label>Effect Orb Movement Speed</label>
                    <input type="range" min="0" max="200" value="100">
                </div>
                <div class="control-group">
                    <label>Typewriter Speed</label>
                    <input type="range" min="10" max="200" value="100">
                </div>
            </div>
        </div>
    </section>

    <script src="static/js/common.js"></script>
    <script src="static/js/settings.js"></script>
</body>
</html>
